---
- name: Start JACK audio server on Raspberry Pis
  hosts: all
  become: false

  vars:
    jack_hw_device: "hw:Gen"   

  tasks:

    - name: Kill all existing jackd processes
      ansible.builtin.command: killall jackd
      ignore_errors: yes

    - name: Start jackd in background with correct env vars
      ansible.builtin.shell: |
        export JACK_NO_AUDIO_RESERVATION=1
        jackd -d alsa -d {{ jack_hw_device }} -r 48000 -p 128 > /home/{{ ansible_user }}/Desktop/jack_log.txt 2>&1
      async: 1
      poll: 0

#note